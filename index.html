<html>

<body style="margin:0;padding:40px;background:#ffffff;font-family:Arial,sans-serif;">

  <tr>

    <th style="background:#f4c7a1;border:2px solid #000;padding:12px 28px;font-size:18px;font-weight:bold;">Classification</th>
    <th style="background:#f4c7a1;border:2px solid #000;padding:12px 28px;font-size:18px;font-weight:bold;">Breakfast</th>
    <th style="background:#f4c7a1;border:2px solid #000;padding:12px 28px;font-size:18px;font-weight:bold;">Lunch</th>
    <th style="background:#f4c7a1;border:2px solid #000;padding:12px 28px;font-size:18px;font-weight:bold;">Dinner</th>
  </tr>

  <tr>
    <td rowspan="2" style="border:2px solid #000;padding:12px 28px;font-size:18px;font-weight:bold;vertical-align:middle;">
      May 18
    </td>

    <td style="background:#92d050;border:2px solid #000;padding:12px 42px;font-size:18px;font-weight:bold;">Organic</td>

    <td style="border:2px solid #000;padding:12px 36px;font-size:18px;">
      0
    </td>

    <td style="border:2px solid #000;padding:12px 36px;font-size:18px;">
      0
    </td>

    <td style="border:2px solid #000;padding:12px 36px;font-size:18px;">
      0
    </td>
  </tr>

  <tr>
    <td style="background:#ffe699;border:2px solid #000;padding:12px 42px;font-size:18px;font-weight:bold;">Inorganic</td>

    <td style="border:2px solid #000;padding:12px 36px;font-size:18px;">
      0
    </td>

    <td style="border:2px solid #000;padding:12px 36px;font-size:18px;">
      0
    </td>

    <td style="border:2px solid #000;padding:12px 36px;font-size:18px;">
      0
    </td>
  </tr>

</table>

<br>

<button onclick="toggleEdit()" style="padding:10px 18px;font-size:16px;font-weight:bold;cursor:pointer;">
  Edit Table
</button>

<script>
function toggleEdit() {
  const cells = document.querySelectorAll("td");
  const button = document.querySelector("button");

  cells.forEach(cell => {
    cell.contentEditable = cell.contentEditable === "true" ? "false" : "true";
  });

  button.innerText = button.innerText === "Edit Table" ? "Save View" : "Edit Table";
}
</script>  

</body>
</html>
